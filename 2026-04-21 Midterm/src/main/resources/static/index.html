<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehman SmartID Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #800000;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .logo .bolt {
            color: #FFC800;
            font-size: 3em;
        }

        .logo p {
            color: #666;
            font-size: 0.9em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #800000;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #800000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #660000;
        }

        .result {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result img {
            max-width: 200px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .result .student-info {
            margin-top: 15px;
            text-align: left;
        }

        .result .student-info p {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        .result .student-info strong {
            color: #800000;
        }

        .error {
            color: red;
            margin-top: 10px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="bolt">⚡</div>
        <h1>Lehman SmartID</h1>
        <p>Digital Student Identification Portal</p>
    </div>

    <div class="input-group">
        <label for="studentId">Enter Student ID</label>
        <input type="text" id="studentId" placeholder="e.g., 12345">
    </div>

    <button onclick="generateID()">Generate Digital ID</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
        <h3>Your Digital ID</h3>
        <img id="qrCode" src="" alt="QR Code">
        <div class="student-info" id="studentInfo"></div>
    </div>
</div>

<script>
    async function generateID() {
        const studentId = document.getElementById('studentId').value.trim();
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const qrImg = document.getElementById('qrCode');
        const studentInfo = document.getElementById('studentInfo');

        // Reset display
        resultDiv.classList.remove('show');
        errorDiv.classList.remove('show');

        if (!studentId) {
            errorDiv.textContent = 'Please enter a Student ID';
            errorDiv.classList.add('show');
            return;
        }

        try {
            // Fetch student data
            const response = await fetch(`/api/student/${studentId}`);

            if (!response.ok) {
                const errorText = await response.text();
                errorDiv.textContent = errorText;
                errorDiv.classList.add('show');
                return;
            }

            const student = await response.json();

            // Generate QR code
            const qrResponse = await fetch(`/generate-id?sid=${studentId}`);
            const qrBlob = await qrResponse.blob();
            const qrUrl = URL.createObjectURL(qrBlob);

            // Display results
            qrImg.src = qrUrl;
            studentInfo.innerHTML = `
                <p><strong>Name:</strong> ${student.name}</p>
                <p><strong>Major:</strong> ${student.major}</p>
                <p><strong>Access Level:</strong> ${student.accessLevel}</p>
                <p><strong>ID:</strong> ${student.id}</p>
            `;

            resultDiv.classList.add('show');

        } catch (error) {
            errorDiv.textContent = 'Error: ' + error.message;
            errorDiv.classList.add('show');
        }
    }
</script>
</body>
</html>
